services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: resume_reverse_proxy
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - resume-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: resume_frontend
    networks:
      - resume-net
    restart: unless-stopped

  api:
    build:
      context: ./backend
      target: runtime
    container_name: resume_api
    environment:
      DATABASE_URL: postgresql+psycopg2://resume:resume@db:5432/resume_screening
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_MB: 15
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
    networks:
      - resume-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      target: runtime
    container_name: resume_worker
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg2://resume:resume@db:5432/resume_screening
      UPLOAD_DIR: /data/uploads
      WORKER_POLL_SECONDS: 3
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
    networks:
      - resume-net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: resume_db
    environment:
      POSTGRES_DB: resume_screening
      POSTGRES_USER: resume
      POSTGRES_PASSWORD: resume
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resume-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume -d resume_screening"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

networks:
  resume-net:
    driver: bridge

volumes:
  uploads:
  postgres_data:
  nginx_logs:
